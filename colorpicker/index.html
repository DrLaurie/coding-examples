<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>HTML Color Picker</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="boring.css">
	
	<script src="library_storage.js"></script>
	<script src="colorpicker.js"></script>
</head>
<body>
<header>
	<h1>HTML Color Picker</h1>
	<h2>By Dr. Laurie Alfaro</h2>
</header>
<main>
	<h3>Select a Color</h3>
	
	<form>
		<p>
			<label for="color">Color Picker:</label>
			<input type="color" name="color" id="color">
		</p>
		<p id="color_selected"></p>
	</form>
</main>
</body>
